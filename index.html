<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0a1f">
  <title>D’ORACLE • The Living Oracle</title>
  <script src="https://js.stripe.com/v3/"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@400;700&display=swap');
    :root { --gold: #c9a66b; --violet: #9f7aea; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at center, #0f0a1f, #05030f);
      color: #f0d9b0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .heading-font { font-family: 'Playfair Display', serif; }
    .logo-font { font-family: 'Playfair Display', serif; letter-spacing: 4px; }
    .glass {
      background: rgba(15,10,31,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(201,166,107,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    .seal { filter: drop-shadow(0 0 40px #c9a66b); }
    .eye { animation: mysticPulse 6s infinite ease-in-out; }
    @keyframes mysticPulse { 0%,100% { opacity:1; } 50% { opacity:0.85; } }
    .btn-gold { background: linear-gradient(90deg, #c9a66b, #9f7aea); color: #111827; font-weight: 700; transition: all 0.3s; }
    .btn-gold:active { transform: scale(0.95); }
    .nav-link { transition: all 0.3s; }
    .nav-link:hover { color: #c9a66b; transform: scale(1.05); }
    .touch-manipulation { touch-action: manipulation; }
  </style>
</head>
<body>

<!-- CENTERED PREMIUM LOGO HEADER -->
<header class="text-center py-10 border-b border-[#c9a66b]/20">
  <div class="flex justify-center items-center gap-6">
    <svg width="110" height="110" viewBox="0 0 200 200" class="eye" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#c9a66b"/><stop offset="100%" stop-color="#9f7aea"/></linearGradient></defs>
      <polygon points="40,165 100,35 160,165" fill="none" stroke="#c9a66b" stroke-width="18" stroke-linejoin="round"/>
      <circle cx="100" cy="100" r="82" fill="none" stroke="#c9a66b" stroke-width="22"/>
      <circle cx="100" cy="100" r="52" fill="none" stroke="#9f7aea" stroke-width="14"/>
      <circle cx="100" cy="100" r="28" fill="#111827"/>
      <circle cx="100" cy="100" r="18" fill="#9f7aea"/>
      <circle cx="100" cy="100" r="8" fill="#c9a66b"/>
    </svg>
    <h1 class="logo-font text-5xl text-[#c9a66b]">D’ORACLE</h1>
  </div>
</header>

<!-- NAVIGATION -->
<nav class="max-w-7xl mx-auto flex justify-center gap-8 py-6 text-lg font-medium border-b border-[#c9a66b]/20">
  <a onclick="navigateTo('ritual')" class="nav-link cursor-pointer">RITUAL</a>
  <a onclick="navigateTo('tools')" class="nav-link cursor-pointer">TOOLS</a>
  <a onclick="navigateTo('community')" class="nav-link cursor-pointer">COMMUNITY</a>
  <a onclick="navigateTo('profile')" class="nav-link cursor-pointer">PROFILE</a>
</nav>

<div id="mainContent" class="max-w-7xl mx-auto p-8">

  <!-- RITUAL SCREEN -->
  <div id="ritualScreen">
    <h2 class="heading-font text-6xl text-center mb-8">SPEAK YOUR WILL</h2>
    <div class="glass max-w-2xl mx-auto rounded-3xl p-10">
      <input id="intentInput" type="text" placeholder="Protection… Wealth… Love… Guidance…" class="w-full bg-transparent border-b border-[#c9a66b]/40 py-6 text-2xl placeholder:text-[#c9a66b]/40 focus:outline-none">
      <div class="flex flex-col sm:flex-row gap-4 mt-10">
        <select id="spiritType" class="flex-1 glass rounded-2xl px-6 py-5 text-lg">
          <option value="angel">Holy Angel</option>
          <option value="demon">Infernal Spirit</option>
          <option value="other">Hermetic Force</option>
        </select>
        <button onclick="generateRitual()" class="flex-1 btn-gold text-2xl py-6 rounded-3xl">INVOKE THE ORACLE</button>
      </div>
    </div>
    <div id="ritualOutput" class="hidden mt-16"></div>
  </div>

  <!-- TOOLS SCREEN -->
  <div id="toolsScreen" class="hidden">
    <h2 class="heading-font text-5xl mb-8 text-center">SACRED TOOLS</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="glass rounded-3xl p-8 text-center">
        <h3 class="text-xl mb-6">⏳ Chronos Gate</h3>
        <div id="chronoDisplay" class="text-3xl font-light mb-4 text-[#c9a66b]"></div>
        <button onclick="updateChrono()" class="text-sm px-8 py-3 border border-[#c9a66b]/60 rounded-3xl hover:bg-[#c9a66b]/10">REFRESH TIMING</button>
      </div>
      <div class="glass rounded-3xl p-8 text-center">
        <h3 class="text-xl mb-6">🜁 Geomantic Oracle</h3>
        <button onclick="castGeomancy()" class="w-full py-6 bg-[#9f7aea]/90 text-white rounded-3xl text-xl">CAST THE 16 FIGURES</button>
        <div id="geomancyResult" class="mt-6 text-sm min-h-[80px]"></div>
      </div>
      <div class="glass rounded-3xl p-8 text-center">
        <h3 class="text-xl mb-6">📟 ÆTHERIC BOARD</h3>
        <canvas id="planchetteCanvas" width="320" height="320" class="mx-auto border border-[#c9a66b]/30 bg-black/40 rounded-3xl cursor-crosshair"></canvas>
        <div id="boardOutput" class="mt-6 font-mono text-[#9f7aea] text-center min-h-[60px]"></div>
      </div>
    </div>
  </div>

  <!-- COMMUNITY SCREEN -->
  <div id="communityScreen" class="hidden">
    <h2 class="heading-font text-5xl mb-8 text-center">THE CIRCLE</h2>
    <div class="glass rounded-3xl p-8">
      <p class="text-center text-lg mb-8">Share your rituals. Learn from fellow seekers.</p>
      <div class="space-y-6">
        <div class="border border-[#c9a66b]/30 rounded-3xl p-6">"The protection ritual worked instantly. Thank you D’ORACLE." — Elena</div>
      </div>
    </div>
  </div>

  <!-- PROFILE SCREEN -->
  <div id="profileScreen" class="hidden">
    <h2 class="heading-font text-5xl mb-8 text-center">YOUR PATH</h2>
    <div class="glass rounded-3xl p-10 max-w-md mx-auto text-center">
      <div id="profileTier" class="text-4xl font-light mb-2"></div>
      <div class="text-[#c9a66b] text-3xl mb-8">Credits: <span id="creditBalance" class="font-bold">15</span></div>
      <button onclick="buyCredits()" class="w-full py-4 btn-gold rounded-3xl mb-4">Buy 10 Credits — $4.99</button>
      <button onclick="shareReferral()" class="w-full py-4 border border-[#c9a66b] text-[#c9a66b] rounded-3xl">Share & Get +5 Credits</button>
    </div>
  </div>
</div>

<script>
  const stripe = Stripe('pk_live_51SZaDzQeJ3mH4h0vyvWJE094f9ysWRqQr652PSx3rAINFkmyCdq4MNA8b4j3pvK38c6MWIWzndHcNM9RVVlFwdbf00ax5WcMZh');
  let currentTier = localStorage.getItem('doracleTier') || 'free';
  let credits = parseInt(localStorage.getItem('doracleCredits') || '15');

  function setTier(t) { currentTier = t; localStorage.setItem('doracleTier', t); }
  function updateCredits() { const el = document.getElementById('creditBalance'); if (el) el.textContent = credits; }

  function canPerformRitual() {
    if (currentTier === 'premium' || currentTier === 'lifetime') return true;
    if (credits > 0) { credits--; localStorage.setItem('doracleCredits', credits); updateCredits(); return true; }
    return false;
  }

  function generateRitual() {
    if (!canPerformRitual()) { alert('No credits left. Upgrade or buy credits.'); return; }
    const output = document.getElementById('ritualOutput');
    output.classList.remove('hidden');
    output.innerHTML = `<div class="glass rounded-3xl p-10 text-center"><h3 class="heading-font text-4xl mb-8">Protocol of Power Activated</h3><button onclick="this.parentElement.classList.add('hidden')" class="mt-10 px-12 py-4 border border-red-500 rounded-3xl">CLOSE THE CIRCLE</button></div>`;
  }

  function navigateTo(screen) {
    document.querySelectorAll('#mainContent > div').forEach(d => d.classList.add('hidden'));
    const target = document.getElementById(screen + 'Screen');
    if (target) target.classList.remove('hidden');
  }

  function showSubscriptionModal() { alert('Subscription modal ready (Stripe connected)'); }
  function buyCredits() { credits += 10; localStorage.setItem('doracleCredits', credits); updateCredits(); alert('10 credits added ($4.99 via Stripe)'); }
  function shareReferral() { credits += 5; localStorage.setItem('doracleCredits', credits); updateCredits(); alert('+5 credits added for sharing!'); }

  // Improved Ætheric Board
  function initPlanchette() {
    const canvas = document.getElementById('planchetteCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let x = 160, y = 160;
    function draw() {
      ctx.clearRect(0,0,320,320);
      ctx.beginPath(); ctx.arc(160,160,130,0,Math.PI*2); ctx.strokeStyle="#c9a66b"; ctx.lineWidth=15; ctx.stroke();
      ctx.fillStyle="#c9a66b"; ctx.fillRect(x-25,y-15,50,30);
      ctx.fillStyle="#111827"; ctx.font="22px sans-serif"; ctx.fillText("▼",x-8,y+8);
    }
    canvas.addEventListener('mousemove', e => { x = e.offsetX; y = e.offsetY; draw(); if(Math.random()>0.6) document.getElementById('boardOutput').textContent += "YES "; });
    draw();
  }

  window.onload = () => {
    updateCredits();
    initPlanchette();
    console.log('%c✅ D’ORACLE — Premium redesigned version loaded', 'color:#c9a66b; font-size:16px');
  };
</script>
</body>
</html>
